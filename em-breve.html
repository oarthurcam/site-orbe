<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbe — Em Breve</title>
  <meta name="description" content="O Orbe está chegando. Retome o controle do seu tempo. Cadastre-se para ser o primeiro a saber." />
  <link rel="icon" type="image/png" href="assets/img/logo-com-fundo.PNG" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary-blue: #007AFF;
      --primary-cyan: #00C6FF;
      --gradient-primary: linear-gradient(135deg, #007AFF, #00C6FF);
      --bg-black: #000000;
      --text-primary: #ffffff;
      --text-secondary: rgba(255,255,255,0.6);
      --text-muted: rgba(255,255,255,0.3);
      --border-subtle: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.1);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      background: var(--bg-black);
      color: var(--text-primary);
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ============================================
       ANIMATED BACKGROUND ORB
       ============================================ */
    .bg-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%,
        rgba(0, 122, 255, 0.2) 0%,
        rgba(0, 198, 255, 0.08) 40%,
        transparent 70%
      );
      filter: blur(60px);
      animation: orb-breathe 6s ease-in-out infinite;
      pointer-events: none;
    }

    .bg-orb-2 {
      position: absolute;
      top: 55%;
      left: 55%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(0, 198, 255, 0.12) 0%,
        rgba(0, 122, 255, 0.04) 50%,
        transparent 70%
      );
      filter: blur(50px);
      animation: orb-breathe 8s ease-in-out 2s infinite reverse;
      pointer-events: none;
    }

    @keyframes orb-breathe {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.6;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.15);
        opacity: 1;
      }
    }

    /* Grid pattern overlay */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      -webkit-mask-image: radial-gradient(circle at center, black 20%, transparent 70%);
      mask-image: radial-gradient(circle at center, black 20%, transparent 70%);
    }

    /* Noise texture */
    .bg-noise {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
      pointer-events: none;
    }

    /* ============================================
       CONTENT
       ============================================ */
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 580px;
      width: 100%;
    }

    /* Logo */
    .logo {
      margin-bottom: 3rem;
      animation: fade-in 1s var(--ease-out-expo) both;
    }

    .logo img {
      height: 48px;
      width: auto;
      object-fit: contain;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      background: rgba(255,255,255,0.03);
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 2rem;
      animation: fade-up 0.8s var(--ease-out-expo) 0.2s both;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary-cyan);
      box-shadow: 0 0 10px var(--primary-cyan);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Title */
    .title {
      font-size: clamp(2.5rem, 7vw, 4.5rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin-bottom: 1.5rem;
      animation: fade-up 0.8s var(--ease-out-expo) 0.35s both;
    }

    .title span {
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Subtitle */
    .subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 3rem;
      animation: fade-up 0.8s var(--ease-out-expo) 0.5s both;
    }

    /* Email form */
    .form {
      display: flex;
      gap: 0.75rem;
      max-width: 460px;
      margin: 0 auto 2rem;
      animation: fade-up 0.8s var(--ease-out-expo) 0.65s both;
    }

    .form-input {
      flex: 1;
      padding: 0.9rem 1.25rem;
      border-radius: 100px;
      border: 1px solid var(--border-light);
      background: rgba(255,255,255,0.04);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
    }

    .form-btn {
      padding: 0.9rem 1.75rem;
      border-radius: 100px;
      border: none;
      background: var(--gradient-primary);
      color: #fff;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .form-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 28px rgba(0, 122, 255, 0.4);
    }

    .form-btn:active {
      transform: scale(0.98);
    }

    /* Success message (hidden by default) */
    .form-success {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 1.5rem;
      border-radius: 100px;
      border: 1px solid rgba(52, 211, 153, 0.3);
      background: rgba(52, 211, 153, 0.08);
      color: #34d399;
      font-size: 0.9375rem;
      font-weight: 500;
      max-width: 460px;
      margin: 0 auto 2rem;
      animation: fade-up 0.5s var(--ease-out-expo) both;
    }

    .form-success.visible {
      display: flex;
    }

    /* Divider line */
    .divider {
      width: 60px;
      height: 1px;
      background: var(--border-light);
      margin: 0 auto 2rem;
      animation: fade-up 0.8s var(--ease-out-expo) 0.8s both;
    }

    /* Social / links */
    .links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      animation: fade-up 0.8s var(--ease-out-expo) 0.9s both;
    }

    .links a {
      color: var(--text-muted);
      font-size: 0.8125rem;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .links a:hover {
      color: var(--text-primary);
    }

    /* Footer */
    .footer-text {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: var(--text-muted);
      z-index: 1;
      animation: fade-in 1s var(--ease-out-expo) 1.2s both;
    }

    /* ============================================
       ANIMATIONS
       ============================================ */
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ============================================
       RESPONSIVE
       ============================================ */
    @media (max-width: 520px) {
      .form {
        flex-direction: column;
      }

      .form-btn {
        width: 100%;
      }

      .logo img {
        height: 36px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-orb"></div>
  <div class="bg-orb-2"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>

  <!-- Content -->
  <div class="content">
    <div class="logo">
      <img src="assets/img/logo-e-nome.png" alt="Orbe" />
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      Em desenvolvimento
    </div>

    <h1 class="title">
      Algo grande está<br/>sendo <span>construído</span>.
    </h1>

    <p class="subtitle">
      O Orbe vai transformar sua relação com a tecnologia.<br/>
      Deixe seu e-mail e seja o primeiro a testar.
    </p>

    <form class="form" id="waitlistForm">
      <input
        type="email"
        class="form-input"
        placeholder="seu@email.com"
        required
        autocomplete="email"
      />
      <button type="submit" class="form-btn">Quero acesso</button>
    </form>

    <div class="form-success" id="formSuccess">
      ✓ Você está na lista. Te avisaremos em breve.
    </div>

    <div class="divider"></div>

    <div class="links">
      <a href="#">Instagram</a>
      <a href="#">Twitter</a>
      <a href="#">Contato</a>
    </div>
  </div>

  <div class="footer-text">&copy; 2026 Orbe. Todos os direitos reservados.</div>

  <script>
    const form = document.getElementById('waitlistForm');
    const success = document.getElementById('formSuccess');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      form.style.display = 'none';
      success.classList.add('visible');
    });
  </script>

</body>
</html>
