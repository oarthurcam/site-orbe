<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbe — Baixe o app</title>
  <meta name="description" content="Orbe — Disciplina Digital. Disponível para Android. iOS em breve." />
  <meta property="og:title" content="Orbe — Baixe o app" />
  <meta property="og:description" content="Bloqueie o caos. Crie o hábito. Disponível para Android." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/png" href="assets/img/logo-com-fundo.PNG" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #007AFF;
      --cyan:    #00C6FF;
      --green:   #34d399;
      --orange:  #f97316;
      --red:     #EF4444;
      --grad:    linear-gradient(135deg, #007AFF, #00C6FF);
      --grad-r:  linear-gradient(135deg, #00C6FF, #007AFF);
      --black:   #000000;
      --card:    rgba(255,255,255,0.035);
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.13);
      --txt1:    #ffffff;
      --txt2:    rgba(255,255,255,0.62);
      --txt3:    rgba(255,255,255,0.35);
      --ease:    cubic-bezier(0.16, 1, 0.3, 1);
    }

    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--txt1);
      font-family: 'Outfit', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── BACKGROUND ────────────────────────────────── */
    .bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    /* Orb central */
    .bg-orb {
      position: absolute;
      top: 42%; left: 50%;
      transform: translate(-50%, -50%);
      width: 560px; height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 36%,
        rgba(0,122,255,.28) 0%,
        rgba(0,198,255,.10) 38%,
        transparent 68%
      );
      filter: blur(72px);
      animation: breathe 7s ease-in-out infinite;
    }
    .bg-orb2 {
      position: absolute;
      top: 58%; left: 54%;
      transform: translate(-50%, -50%);
      width: 340px; height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(0,198,255,.14) 0%,
        rgba(0,122,255,.04) 55%,
        transparent 70%
      );
      filter: blur(52px);
      animation: breathe 9s ease-in-out 2.5s infinite reverse;
    }

    /* Grid */
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 52px 52px;
      -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 45%, black 20%, transparent 72%);
      mask-image: radial-gradient(ellipse 80% 70% at 50% 45%, black 20%, transparent 72%);
    }

    /* Noise */
    .bg-noise {
      position: absolute; inset: 0; opacity: .028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 220px 220px;
    }

    @keyframes breathe {
      0%,100% { transform: translate(-50%,-50%) scale(1);   opacity: .7; }
      50%      { transform: translate(-50%,-50%) scale(1.18); opacity: 1;  }
    }

    /* ── CANVAS PARTICLES ──────────────────────────── */
    #particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      opacity: .55;
    }

    /* ── LAYOUT ────────────────────────────────────── */
    .page {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 3.5rem 1.5rem 3rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
    }

    /* ── LOGO ──────────────────────────────────────── */
    .logo-wrap {
      margin-bottom: 2rem;
      opacity: 0; transform: translateY(20px);
      animation: rise .8s var(--ease) .1s forwards;
    }
    .logo-wrap img { height: 42px; width: auto; }

    /* ── APP ICON RING ─────────────────────────────── */
    .icon-ring {
      position: relative;
      width: 100px; height: 100px;
      margin-bottom: 1.75rem;
      opacity: 0; transform: scale(.85);
      animation: pop .9s var(--ease) .25s forwards;
    }
    .icon-ring-glow {
      position: absolute; inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,122,255,.22) 0%, transparent 70%);
      filter: blur(12px);
      animation: glow-pulse 3s ease-in-out infinite;
    }
    .icon-img {
      width: 100%; height: 100%;
      border-radius: 26px;
      object-fit: cover;
      box-shadow: 0 0 0 1px var(--border2), 0 20px 48px rgba(0,0,0,.6);
    }

    @keyframes spin       { to { transform: rotate(360deg); } }
    @keyframes glow-pulse { 0%,100% { opacity: .7 } 50% { opacity: 1 } }

    /* ── HEADING ───────────────────────────────────── */
    .app-name {
      font-size: 2rem; font-weight: 800;
      letter-spacing: -.04em; line-height: 1;
      background: var(--grad);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: .4rem;
      opacity: 0; transform: translateY(14px);
      animation: rise .8s var(--ease) .4s forwards;
    }
    .tagline {
      font-size: .9375rem; font-weight: 400;
      color: var(--txt2); text-align: center;
      line-height: 1.55; margin-bottom: 2.25rem;
      opacity: 0; transform: translateY(12px);
      animation: rise .8s var(--ease) .52s forwards;
    }

    /* ── DIVIDER ───────────────────────────────────── */
    .divider-label {
      font-size: .75rem; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--txt3);
      display: flex; align-items: center; gap: .75rem;
      width: 100%; margin-bottom: 1rem;
      opacity: 0; animation: rise .7s var(--ease) .65s forwards;
    }
    .divider-label::before, .divider-label::after {
      content: ''; flex: 1; height: 1px;
      background: var(--border);
    }

    /* ── DOWNLOAD CARDS ────────────────────────────── */
    .cards { width: 100%; display: flex; flex-direction: column; gap: .875rem; margin-bottom: 2rem; }

    .dl-card {
      position: relative; overflow: hidden;
      display: flex; align-items: center; gap: 1rem;
      padding: 1.1rem 1.3rem;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--card);
      text-decoration: none; color: inherit;
      transition: transform .3s var(--ease), border-color .3s, background .3s, box-shadow .3s;
      opacity: 0; transform: translateY(16px);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .dl-card:nth-child(1) { animation: rise .75s var(--ease) .72s forwards; }
    .dl-card:nth-child(2) { animation: rise .75s var(--ease) .84s forwards; }

    /* Android — active */
    .dl-card--android {
      border-color: rgba(0,122,255,.3);
      background: rgba(0,122,255,.06);
    }
    .dl-card--android:hover {
      transform: translateY(-3px) scale(1.01);
      border-color: rgba(0,198,255,.55);
      background: rgba(0,122,255,.1);
      box-shadow: 0 16px 48px rgba(0,122,255,.22), 0 0 0 1px rgba(0,198,255,.2);
    }

    /* Shimmer on Android card */
    .dl-card--android::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,.04) 50%, transparent 65%);
      transform: translateX(-100%);
      animation: shimmer 4s ease-in-out 2s infinite;
    }
    @keyframes shimmer { 0%,100% { transform: translateX(-100%) } 40%,60% { transform: translateX(100%) } }

    /* Pulse ring on Android */
    .dl-card--android::after {
      content: '';
      position: absolute; inset: -1px;
      border-radius: 18px;
      background: transparent;
      box-shadow: 0 0 0 0 rgba(0,198,255,.4);
      animation: ring-pulse 3.5s ease-out 1.5s infinite;
      pointer-events: none;
    }
    @keyframes ring-pulse {
      0%   { box-shadow: 0 0 0 0   rgba(0,198,255,.35) }
      60%  { box-shadow: 0 0 0 10px rgba(0,198,255,0)  }
      100% { box-shadow: 0 0 0 0   rgba(0,198,255,0)   }
    }

    /* iOS — coming soon */
    .dl-card--ios {
      cursor: default;
    }
    .dl-card--ios .dl-icon,
    .dl-card--ios .dl-body { opacity: .38; }
    .dl-card--ios:hover { transform: none; box-shadow: none; border-color: var(--border); }

    .dl-icon {
      flex-shrink: 0;
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .dl-icon svg { width: 28px; height: 28px; }

    .dl-icon--android { background: rgba(0,122,255,.15); color: var(--cyan); }
    .dl-icon--ios     { background: rgba(255,255,255,.07); color: rgba(255,255,255,.5); }

    .dl-body { flex: 1; }
    .dl-label {
      font-size: .72rem; font-weight: 600; letter-spacing: .05em;
      text-transform: uppercase; color: var(--txt3);
      line-height: 1; margin-bottom: .28rem;
    }
    .dl-title {
      font-size: 1rem; font-weight: 700;
      color: var(--txt1); line-height: 1.2;
    }
    .dl-title small {
      display: block; font-size: .8125rem;
      font-weight: 400; color: var(--txt2); margin-top: .18rem;
    }

    .dl-badge {
      flex-shrink: 0;
      font-size: .7rem; font-weight: 700; letter-spacing: .04em;
      text-transform: uppercase; padding: .3rem .7rem;
      border-radius: 100px;
    }
    .dl-badge--live {
      background: rgba(0,198,255,.12);
      color: var(--cyan);
      border: 1px solid rgba(0,198,255,.25);
    }
    .dl-badge--live::before {
      content: ''; display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%; background: var(--cyan);
      margin-right: .35rem;
      animation: dot-blink 1.8s ease-in-out infinite;
      vertical-align: middle; margin-bottom: 1px;
    }
    .dl-badge--soon {
      background: rgba(255,255,255,.05);
      color: var(--txt3);
      border: 1px solid var(--border);
    }

    @keyframes dot-blink { 0%,100% { opacity: 1 } 50% { opacity: .2 } }

    /* ── LINKS SECTION ─────────────────────────────── */
    .links-divider {
      font-size: .75rem; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--txt3);
      display: flex; align-items: center; gap: .75rem;
      width: 100%; margin-bottom: 1rem;
      opacity: 0; animation: rise .7s var(--ease) .95s forwards;
    }
    .links-divider::before, .links-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .links-grid {
      width: 100%; display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem; margin-bottom: 2.5rem;
    }

    .link-chip {
      display: flex; align-items: center; justify-content: center; gap: .55rem;
      padding: .85rem 1rem;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--card);
      text-decoration: none;
      font-size: .875rem; font-weight: 600; color: var(--txt2);
      transition: all .28s var(--ease);
      opacity: 0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .link-chip:nth-child(1) { animation: rise .7s var(--ease) 1s forwards; }
    .link-chip:nth-child(2) { animation: rise .7s var(--ease) 1.08s forwards; }
    .link-chip:nth-child(3) { animation: rise .7s var(--ease) 1.16s forwards; }

    .link-chip:hover {
      color: var(--txt1);
      border-color: var(--border2);
      background: rgba(255,255,255,.06);
      transform: translateY(-2px);
    }
    .link-chip svg { width: 18px; height: 18px; flex-shrink: 0; opacity: .8; }

    .link-chip--whatsapp:hover { color: var(--green); border-color: rgba(52,211,153,.3); background: rgba(52,211,153,.06); }
    .link-chip--site:hover     { color: var(--cyan);  border-color: rgba(0,198,255,.3);  background: rgba(0,198,255,.06);  }
    .link-chip--support:hover  { color: var(--orange); border-color: rgba(249,115,22,.3); background: rgba(249,115,22,.06); }

    /* ── FOOTER ────────────────────────────────────── */
    .footer {
      font-size: .75rem; color: var(--txt3); text-align: center; line-height: 1.6;
      opacity: 0; animation: rise .7s var(--ease) 1.25s forwards;
    }
    .footer a { color: var(--txt3); text-decoration: none; transition: color .2s; }
    .footer a:hover { color: var(--txt2); }

    /* ── ANIMATIONS ────────────────────────────────── */
    @keyframes rise {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes pop {
      to { opacity: 1; transform: scale(1); }
    }

    /* ── RESPONSIVE ────────────────────────────────── */
    @media (max-width: 460px) {
      .page { padding: 3rem 1.25rem 2.5rem; }
      .links-grid { grid-template-columns: 1fr; }
      .link-chip:nth-child(1),
      .link-chip:nth-child(2),
      .link-chip:nth-child(3) { animation-delay: calc(.95s + var(--i, 0) * .08s); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

  <script>
    /* ── Partículas ─────────────────────────────────── */
    (function () {
      var canvas = document.getElementById('particles');
      var ctx = canvas.getContext('2d');
      var W, H, dots = [], RAF;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize, { passive: true });
      resize();

      var COLORS = ['rgba(0,122,255,', 'rgba(0,198,255,', 'rgba(0,122,255,'];

      for (var i = 0; i < 52; i++) {
        dots.push({
          x: Math.random() * 1, y: Math.random() * 1,
          vx: (Math.random() - .5) * .00012,
          vy: (Math.random() - .5) * .00012,
          r: Math.random() * 1.4 + .4,
          a: Math.random() * .5 + .15,
          c: COLORS[Math.floor(Math.random() * COLORS.length)]
        });
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        dots.forEach(function (d) {
          d.x += d.vx; d.y += d.vy;
          if (d.x < 0) d.x = 1; if (d.x > 1) d.x = 0;
          if (d.y < 0) d.y = 1; if (d.y > 1) d.y = 0;
          ctx.beginPath();
          ctx.arc(d.x * W, d.y * H, d.r, 0, Math.PI * 2);
          ctx.fillStyle = d.c + d.a + ')';
          ctx.fill();
        });
        RAF = requestAnimationFrame(draw);
      }

      /* Pausa quando a aba está em segundo plano */
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) cancelAnimationFrame(RAF);
        else draw();
      });

      draw();
    })();
  </script>

</body>
